services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: meu-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    build: .
    container_name: meu-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  mysql:
    image: mysql:8.0
    container_name: meu-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=senha123
      - MYSQL_DATABASE=sistema_cadastro
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psenha123"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: